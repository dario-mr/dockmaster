apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-whitelist
  namespace: crowdsec
data:
  my-whitelist.yaml: |
    name: crowdsecurity/my-whitelist
    description: "Admin IP whitelist"
    whitelist:
      reason: "admin IP"
      ip:
        - "86.49.252.108"
        - "46.135.16.188"
        - "185.40.248.10"
  headlamp-whitelist.yaml: |
    name: crowdsecurity/headlamp-whitelist
    description: "Whitelist Headlamp dashboard static plugin requests (expected 404s)"
    whitelist:
      reason: "Headlamp static plugin resources that return 404"
      expression:
        - evt.Parsed.request startsWith '/dashboard/static-plugins/'
  inactive-apps-whitelist.yaml: |
    name: crowdsecurity/inactive-apps-whitelist
    description: "Whitelist health/info probes for apps not currently deployed"
    whitelist:
      reason: "frontend app probing inactive services"
      expression:
        - evt.Parsed.request matches '^/(ichiro-family-tree|ichiro-walks|shortly|api-stress-test|htmx-demo|portainer)/'
