apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-dashboard
      version: "7.12.0"
      sourceRef:
        kind: HelmRepository
        name: kubernetes-dashboard
        namespace: flux-system
  values:
    app:
      ingress:
        enabled: false
      settings:
        global:
          clusterName: dockmaster
    auth:
      extraArgs:
        - --enable-skip-login
    kong:
      proxy:
        tls:
          enabled: false
