apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-redirect
  namespace: kubernetes-dashboard
spec:
  redirectRegex:
    regex: ^(https?://[^/]*)/dashboard$
    replacement: ${1}/dashboard/
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: kubernetes-dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dariolab.com`) && PathPrefix(`/dashboard`)
      kind: Rule
      services:
        - name: headlamp
          port: 80
      middlewares:
        - name: dashboard-redirect
  tls:
    certResolver: letsencrypt
