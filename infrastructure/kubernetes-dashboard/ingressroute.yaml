apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: kubernetes-dashboard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dariolab.com`) && PathPrefix(`/dashboard`)
      kind: Rule
      services:
        - name: headlamp
          port: 80
      middlewares:
        - name: dashboard-basic-auth
        - name: default-headers
          namespace: apps
        - name: rate-limit-global
          namespace: apps
  tls:
    certResolver: letsencrypt
