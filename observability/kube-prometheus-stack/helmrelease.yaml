apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "72.9.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    alertmanager:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 14d
        retentionSize: 5GB
        scrapeInterval: 60s
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
        additionalScrapeConfigs:
          - job_name: spring-boot
            metrics_path: /actuator/prometheus
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [apps]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_label_app]
                action: replace
                target_label: app
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
    kubelet:
      serviceMonitor:
        kubelet: false
        cAdvisor: true
        probes: true
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - action: drop
            regex: (etcd_request|apiserver_request_slo|apiserver_request_sli|apiserver_request)_duration_seconds_bucket;(0\.15|0\.2|0\.3|0\.35|0\.4|0\.45|0\.6|0\.7|0\.8|0\.9|1\.25|1\.5|1\.75|2|3|3\.5|4|4\.5|6|7|8|9|15|20|40|45|50)(\.0)?
            sourceLabels:
              - __name__
              - le
          - action: drop
            regex: (apiserver_request_duration_seconds_bucket|etcd_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_request_body_size_bytes_bucket|apiserver_response_sizes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_events_sizes_bucket)
            sourceLabels:
              - __name__
    grafana:
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      "grafana.ini":
        server:
          root_url: "https://${DOMAIN}/grafana/"
          serve_from_sub_path: true
      persistence:
        enabled: true
        size: 2Gi
        storageClassName: longhorn
      initChownData:
        enabled: false
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      ingress:
        enabled: false
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: false
        datasources:
          enabled: true
          uid: prometheus
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.observability.svc.cluster.local:3100
          access: proxy
          isDefault: false
    prometheus-node-exporter:
      enabled: true
    kube-state-metrics:
      enabled: true
