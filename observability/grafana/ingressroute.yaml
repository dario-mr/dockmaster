apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: observability
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${DOMAIN}`) && PathPrefix(`/grafana/`)
      kind: Rule
      middlewares:
        - name: crowdsec-bouncer
          namespace: apps
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls:
    store:
      name: default
      namespace: kube-system
