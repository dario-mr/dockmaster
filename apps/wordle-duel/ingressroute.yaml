apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-wordle-duel
  namespace: apps
spec:
  stripPrefix:
    prefixes:
      - /wordle-duel
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wordle-duel
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dariolab.com`) && PathPrefix(`/wordle-duel`)
      kind: Rule
      services:
        - name: wordle-duel
          port: 80
      middlewares:
        - name: crowdsec-bouncer
        - name: strip-wordle-duel
        - name: default-headers
        - name: rate-limit-app
  tls:
    certResolver: letsencrypt
