apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordle-duel-service-redis
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordle-duel-service-redis
  template:
    metadata:
      labels:
        app: wordle-duel-service-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: wordle-duel-service-redis-data-longhorn
